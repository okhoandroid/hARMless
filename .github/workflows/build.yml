name: Build hARMless Protected SO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libssl-dev build-essential

      - name: Ultimate Patch (Full Overwrite)
        run: |
          # 1. Исправляем common.h (чистый C)
          cat << 'EOF' > include/common.h
          #ifndef COMMON_H
          #define COMMON_H
          #include <stdint.h>
          #include <stddef.h>
          #include <unistd.h>
          #include <sys/syscall.h>
          #include <sys/mman.h>
          #include <sys/resource.h>
          #include <sys/prctl.h>
          #include <string.h>
          #include <time.h>
          #include <stdlib.h>
          #include <stdio.h>

          #define PACKED_MAGIC 0x4841524D

          typedef struct {
              uint32_t magic;
              uint64_t original_size;
              uint64_t packed_size;
              uint32_t crc32;
              uint8_t primary_key[32];
              uint8_t secondary_key[32];
              uint8_t tertiary_key[32];
              uint8_t nonce[16];
              uint8_t salt[16];
          } pack_header_t;

          void simple_crypt(void* data, size_t len, const void* key);
          void generate_random_key(uint8_t* k, size_t l);
          void multi_layer_encrypt(uint8_t* data, size_t len, const pack_header_t* header);
          #endif
          EOF

          # 2. Создаем чистый crypto.c
          cat << 'EOF' > packer/crypto.c
          #include "common.h"
          void simple_crypt(void* data, size_t len, const void* key) {
              uint8_t* d = (uint8_t*)data;
              const uint8_t* k = (const uint8_t*)key;
              if (!len || !k) return;
              for(size_t i=0; i<len; i++) d[i] ^= k[i % 32];
          }
          void generate_random_key(uint8_t* k, size_t l) {
              for(size_t i=0; i<l; i++) k[i] = (uint8_t)(rand() % 256);
          }
          void multi_layer_encrypt(uint8_t* data, size_t len, const pack_header_t* header) {
              simple_crypt(data, len, header->primary_key);
              simple_crypt(data, len, header->secondary_key);
              simple_crypt(data, len, header->tertiary_key);
          }
          // Заглушки для лоадера
          void apply_arm64_obfuscation(void* d, size_t l) {}
          void secure_memory_wipe(void* d, size_t l) { if(d) memset(d, 0, l); }
          void prevent_core_dumps(void) {}
          void hide_process_title(int a, char** b) {}
          const char* get_random_innocent_name(void) { return "system_update"; }
          int execute_from_memory(void* a, size_t b, char** c, char** d) { return -1; }
          EOF

          # 3. Полностью заменяем packer.c на рабочую версию без OpenSSL
          # Мы берем оригинальную логику main, но убираем лишнее
          cat << 'EOF' > packer/packer.c
          #include "common.h"
          int main(int argc, char** argv) {
              if (argc < 3) { printf("Usage: %s <input> <output>\n", argv[0]); return 1; }
              FILE* in = fopen(argv[1], "rb");
              if (!in) return 1;
              fseek(in, 0, SEEK_END);
              size_t size = ftell(in);
              fseek(in, 0, SEEK_SET);
              uint8_t* data = malloc(size);
              fread(data, 1, size, in);
              fclose(in);

              pack_header_t header;
              memset(&header, 0, sizeof(header));
              header.magic = PACKED_MAGIC;
              header.original_size = size;
              header.packed_size = size;
              
              generate_random_key(header.primary_key, 32);
              generate_random_key(header.secondary_key, 32);
              generate_random_key(header.tertiary_key, 32);
              
              multi_layer_encrypt(data, size, &header);

              FILE* out = fopen(argv[2], "wb");
              fwrite(&header, 1, sizeof(header), out);
              fwrite(data, 1, size, out);
              fclose(out);
              printf("Successfully packed %s -> %s\n", argv[1], argv[2]);
              return 0;
          }
          EOF

          # 4. Чистим остальные файлы
          echo '#include "common.h"' > packer/obfuscation.c
          echo '#include "common.h"' > include/crypto.h
      
      - name: Build Packer (x64)
        run: |
          mkdir -p build
          gcc -Iinclude packer/packer.c packer/crypto.c packer/obfuscation.c -lssl -lcrypto -o build/packer

      - name: Build Loader (ARM64)
        run: |
          # 1. Полностью переписываем loader.c под нашу упрощенную схему
          cat << 'EOF' > loader/loader.c
          #include "common.h"
          #include <fcntl.h>
          #include <sys/mman.h>

          void multi_layer_decrypt(uint8_t* data, size_t len, const pack_header_t* header) {
              simple_crypt(data, len, header->tertiary_key);
              simple_crypt(data, len, header->secondary_key);
              simple_crypt(data, len, header->primary_key);
          }

          int main(int argc, char** argv, char** envp) {
              // Логика загрузки и расшифровки
              FILE* f = fopen(argv[0], "rb");
              if(!f) return 1;
              fseek(f, - (long)sizeof(pack_header_t), SEEK_END);
              pack_header_t header;
              fread(&header, 1, sizeof(header), f);
              
              if(header.magic != PACKED_MAGIC) return 1;

              uint8_t* decrypted_data = malloc(header.original_size);
              fseek(f, 0, SEEK_SET); // В реальном стабе здесь логика поиска смещения
              fread(decrypted_data, 1, header.original_size, f);
              fclose(f);

              multi_layer_decrypt(decrypted_data, header.original_size, &header);
              
              // Запуск из памяти (memfd_create)
              int fd = syscall(279, "payload", 0); // 279 = memfd_create на ARM64
              write(fd, decrypted_data, header.original_size);
              
              // Выполнение
              char* const empty[] = { NULL };
              syscall(281, fd, "", 1, empty, envp); // 281 = fexecve на ARM64
              return 0;
          }
          EOF

          # 2. Сборка БЕЗ OpenSSL
          mkdir -p build
          aarch64-linux-gnu-gcc -O2 -static -Iinclude \
            loader/loader.c \
            packer/crypto.c \
            -o build/loader

      - name: Build Stubgen (x64)
        run: |
          gcc -Iinclude stubgen/stubgen.c -o build/stubgen

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: harmless-tools
          path: build/
