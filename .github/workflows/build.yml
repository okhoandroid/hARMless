name: Build hARMless Protected SO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libssl-dev build-essential

      - name: Fix ARM64 inline asm for x86_64
        run: |
          sed -i 's/__asm__.*//g' include/common.h
          sed -i 's/register.*//g' include/common.h

      - name: Patch include/common.h for x86_64 compatibility
        run: |
          cat << 'EOF' > include/common.h
          #ifndef COMMON_H
          #define COMMON_H
          #include <unistd.h>
          #include <sys/syscall.h>
          #include <stdint.h>

          static inline long syscall1(long n, long a1) { return syscall(n, a1); }
          static inline long syscall2(long n, long a1, long a2) { return syscall(n, a1, a2); }
          static inline long syscall3(long n, long a1, long a2, long a3) { return syscall(n, a1, a2, a3); }
          static inline long syscall6(long n, long a1, long a2, long a3, long a4, long a5, long a6) { 
              return syscall(n, a1, a2, a3, a4, a5, a6); 
          }
          #endif
          EOF

      - name: Build Packer (x64)
        run: |
          mkdir -p build
          gcc -Iinclude packer/packer.c packer/crypto.c packer/obfuscation.c -lssl -lcrypto -o build/packer

      - name: Build Loader (ARM64)
        run: |
          aarch64-linux-gnu-gcc -Iinclude -c loader/loader.c -o build/loader.o
          aarch64-linux-gnu-gcc -Iinclude build/loader.o -o build/loader || true

      - name: Build Stubgen (x64)
        run: |
          gcc -Iinclude stubgen/stubgen.c -o build/stubgen

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: harmless-tools
          path: build/
